apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
patches:
  - target:
      kind: LeaderWorkerSet
      name: wide-ep-decode
    patch: |-
      - op: add
        path: /metadata/labels/llm-d.ai~1deployment
        value: decode-bench
      - op: add
        path: /spec/leaderWorkerTemplate/workerTemplate/metadata/labels/llm-d.ai~1deployment
        value: decode-bench
      - op: add
        path: /spec/leaderWorkerTemplate/workerTemplate/spec/containers/0/env/-
        value:
          name: KV_TRANSFER_CONFIG
          value: '{"kv_connector":"DecodeBenchConnector","kv_role":"kv_both","kv_connector_extra_config":{"fill_mean":0.015,"fill_std":0.0}}'
      - op: add
        path: /spec/leaderWorkerTemplate/workerTemplate/spec/containers/0/env/-
        value:
          name: VLLM_MOE_ROUTING_SIMULATION_STRATEGY
          value: "uniform_random"
